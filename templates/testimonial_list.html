<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Testimonials</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eef2f7,#f8fafc);
margin:0;
min-height:100vh;
}

/* NAVBAR */

.header-with-topbar{
background:#000;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.dashboard-header{
padding:16px 24px;
}

.dashboard-header h4{
font-weight:600;
}

.dashboard-header small{
opacity:.8;
}

.dashboard-header .nav-link{
color:#fff !important;
font-weight:500;
transition:0.25s;
}

.dashboard-header .nav-link:hover{
color:#cfcfcf !important;
}

.navbar-toggler{
border:0;
}

.navbar-toggler-icon{
filter:invert(1);
}

/* PAGE */

.page-wrapper{
padding:60px 20px;
}

.container-box{
max-width:1050px;
margin:auto;
}

/* TOP BAR */

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.top h2{
font-weight:600;
}

/* BUTTONS */

.btn-black{
padding:9px 18px;
background:#000;
color:#fff;
text-decoration:none;
border-radius:8px;
font-size:14px;
font-weight:500;
transition:0.25s;
display:inline-flex;
align-items:center;
gap:6px;
}

.btn-black:hover{
background:#333;
transform:translateY(-1px);
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

.btn-danger-custom{
background:#e74c3c;
}

.btn-danger-custom:hover{
background:#c0392b;
}

/* TABLE CARD */

.table-card{
background:#fff;
border-radius:14px;
box-shadow:0 12px 35px rgba(0,0,0,0.08);
overflow:hidden;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:16px 16px;
vertical-align:middle;
font-size:14px;
}

th{
background:#f3f4f6;
font-weight:600;
}

tbody tr{
border-bottom:1px solid #eee;
transition:0.2s;
}

tbody tr:hover{
background:#fafafa;
}

/* ACTIONS */

.actions{
display:flex;
gap:10px;
}

/* EMPTY */

.empty{
text-align:center;
padding:40px;
color:#888;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<header class="header-with-topbar">
<nav class="navbar dashboard-header navbar-expand-lg">
<div class="container-fluid px-0">

<div class="d-flex align-items-center gap-3">
<i class="bi bi-chat-left-quote fs-2 text-white"></i>

<div class="text-white">
<h4 class="mb-0">Testimonials</h4>
<small>Manage customer feedback</small>
</div>
</div>

<button class="navbar-toggler" type="button"
data-bs-toggle="collapse" data-bs-target="#adminNavbar">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="adminNavbar">

<ul class="navbar-nav align-items-lg-center gap-lg-3 mt-3 mt-lg-0">

<li class="nav-item">
<a class="nav-link" href="{% url 'dashboard' %}">
<i class="bi bi-house"></i> Home
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'testimonial_list' %}">
<i class="bi bi-chat-left-text"></i> Testimonials
</a>
</li>

<li class="nav-item">
<a class="nav-link text-danger" href="{% url 'user_logout' %}">
<i class="bi bi-box-arrow-right"></i> Logout
</a>
</li>

</ul>

</div>
</div>
</nav>
</header>

<!-- PAGE -->

<div class="page-wrapper">
<div class="container-box">

<div class="top">

<h2>Testimonials</h2>

<a href="{% url 'add_testimonial' %}" class="btn-black">
<i class="bi bi-plus-lg"></i>
Add Testimonial
</a>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Review</th>
<th style="width:180px;">Actions</th>
</tr>
</thead>

<tbody>

{% for t in testimonials %}

<tr>

<td>{{ forloop.counter }}</td>
<td>{{ t.name|safe }}</td>
<td>{{ t.review|safe }}</td>

<td>

<div class="actions">

<a href="{% url 'edit_testimonial' t.id %}" class="btn-black">
<i class="bi bi-pencil"></i>
Edit
</a>

<a href="{% url 'delete_testimonial' t.id %}"
class="btn-black btn-danger-custom"
onclick="return confirm('Delete this testimonial?')">

<i class="bi bi-trash"></i>
Delete

</a>

</div>

</td>

</tr>

{% empty %}

<tr>
<td colspan="4">
<div class="empty">
<i class="bi bi-chat-left-text fs-3"></i><br><br>
No testimonials found
</div>
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
