<!doctype html>
<html class="no-js" lang="en">
<head>
    {% load static %}
    <title>Profile</title>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="author" content="Trendo">
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/vendors.min.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/icon.min.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}"/>
    <link rel="stylesheet" href="{% static 'demos/clothing-store/clothing-store.css' %}" />
</head>

<body data-mobile-nav-style="classic">

{% include 'components/navbar.html' %}

<!-- Page Title -->
<section class="page-title-center-alignment cover-background py-0" style="background-image: url({% static 'images/banners/contact-banner.png' %})">
    <div class="container">
        <div class="row flex-column align-items-center justify-content-center h-500px md-h-400px sm-h-300px">
            <div class="col-12 text-center">
                <h1 class="alt-font text-white">Profile</h1>
            </div>
        </div>
    </div>
</section>

<style>
.profile-card {
    background:#fff;
    border-radius:12px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}
.profile-avatar {
    width:130px;
    height:130px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid #f1f1f1;
}
.upload-btn {
    background:#111;
    color:#fff;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
    display:inline-block;
}
.upload-btn input {display:none;}
.save-btn {
    background:#111;
    color:#fff;
    padding:12px;
    border-radius:8px;
    width:100%;
    border:none;
}
</style>

<div class="container py-5">
<div class="row justify-content-center">
<div class="col-lg-7">

<div class="profile-card text-center">

{% if messages %}
{% for message in messages %}
<div class="alert alert-success">{{ message }}</div>
{% endfor %}
{% endif %}

<!-- IMAGE -->
<div class="mb-20px">
{% if profile.image %}
<img src="{{ profile.image.url }}" class="profile-avatar" id="avatarPreview">
{% else %}
<img src="/static/images/default-profile.png" class="profile-avatar" id="avatarPreview">
{% endif %}
</div>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<label class="upload-btn mb-25px">
Change Photo
<input type="file" id="imageInput" name="image">
</label>

<div class="row text-start">

<div class="col-md-6 mb-20px">
<label>First Name</label>
<input type="text" class="form-control" value="{{ request.user.first_name }}" readonly>
</div>

<div class="col-md-6 mb-20px">
<label>Email</label>
<input type="text" class="form-control" value="{{ request.user.email }}" readonly>
</div>

<div class="col-md-12 mb-20px">
<label>Phone</label>
<input type="text" name="phone" class="form-control" value="{{ profile.phone }}">
</div>

<div class="col-md-12 mb-20px">
<label>Address</label>
<input type="text" name="address" class="form-control" value="{{ profile.address }}">
</div>

<div class="col-md-6 mb-20px">
<label>Town</label>
<input type="text" name="town" class="form-control" value="{{ profile.town }}">
</div>

<div class="col-md-6 mb-20px">
<label>State</label>
<input type="text" name="state" class="form-control" value="{{ profile.state }}" readonly>
</div>

<div class="col-md-6 mb-20px">
<label>Pincode</label>
<input type="text" name="pincode" class="form-control" value="{{ profile.pincode }}">
</div>

<div class="col-md-6 mb-20px">
<label>Landmark</label>
<input type="text" name="land_mark" class="form-control" value="{{ profile.land_mark }}">
</div>

</div>

<button type="submit" class="save-btn">Save Details</button>

</form>
</div>
</div>
</div>
</div>

{% include 'components/footer.html' %}

<script>
document.getElementById("imageInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file) {
        document.getElementById("avatarPreview").src = URL.createObjectURL(file);
    }
});
</script>

<script src="{% static 'js/jquery.js' %}"></script>
<script src="{% static 'js/vendors.min.js' %}"></script>
<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
