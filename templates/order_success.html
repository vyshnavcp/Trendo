<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Successful</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#fdfbfb,#ebedee);
}

/* Card */
.success-card{
    width:450px;
    background:#fff;
    border-radius:25px;
    padding:50px 40px;
    text-align:center;
    box-shadow:0 30px 60px rgba(0,0,0,0.12);
    position:relative;
    overflow:hidden;
    animation:fadeInUp 0.8s ease forwards;
    transform:translateY(30px);
    transition:all 0.3s ease;
}

.success-card:hover{
    transform:translateY(0px) scale(1.02);
    box-shadow:0 35px 70px rgba(0,0,0,0.15);
}

@keyframes fadeInUp{
    to {opacity:1; transform:translateY(0);}
}

/* Floating Check Animation */
.icon-circle{
    width:100px;
    height:100px;
    margin:0 auto 25px;
    border-radius:50%;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    color:#fff;
    box-shadow:0 15px 40px rgba(34,197,94,0.35);
    position:relative;
    animation:floatCheck 1.2s ease-in-out infinite;
}

@keyframes floatCheck{
    0%,100% {transform:translateY(0);}
    50% {transform:translateY(-8px);}
}

/* Title */
.success-title{
    font-size:28px;
    font-weight:700;
    color:#222;
    margin-bottom:8px;
    letter-spacing:0.5px;
    animation:titleFade 0.8s ease forwards;
}

@keyframes titleFade{
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* Subtitle */
.success-sub{
    color:#555;
    font-size:15px;
    margin-bottom:30px;
}

/* Order Box */
.order-box{
    background:#f9f9f9;
    border-radius:16px;
    padding:20px 25px;
    text-align:left;
    margin-bottom:30px;
    border:1px solid #e0e0e0;
    animation:fadeIn 1s ease forwards;
}

.order-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
    font-size:15px;
    color:#555;
}

.order-row:last-child{
    margin-bottom:0;
}

.order-label{
    font-weight:500;
    color:#888;
}

.order-value{
    font-weight:600;
    color:#222;
}

/* Buttons */
.btn-group{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    padding:14px 28px;
    border-radius:50px;
    font-size:15px;
    font-weight:500;
    text-decoration:none;
    transition:all 0.3s ease;
    display:inline-block;
}

.btn-primary{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:#fff;
    box-shadow:0 10px 25px rgba(34,197,94,0.35);
}

.btn-primary:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 15px 30px rgba(34,197,94,0.45);
}

.btn-secondary{
    background:#f3f4f6;
    color:#111;
}

.btn-secondary:hover{
    background:#e5e7eb;
    transform:translateY(-2px);
}

/* Responsive */
@media(max-width:480px){
    .success-card{
        width:95%;
        padding:35px 25px;
    }

    .icon-circle{
        width:80px;
        height:80px;
        font-size:42px;
    }

    .success-title{
        font-size:24px;
    }

    .success-sub{
        font-size:14px;
    }

    .order-row{
        font-size:14px;
    }

    .btn{
        padding:12px 20px;
        font-size:14px;
    }
}
</style>
</head>

<body>

<div class="success-card">

    <div class="icon-circle">✓</div>

    <div class="success-title">Payment Successful</div>
    <div class="success-sub">Your payment has been confirmed successfully!</div>

    {% if order %}
    <div class="order-box">
        <div class="order-row">
            <span class="order-label">Order ID</span>
            <span class="order-value">#{{ order.id }}</span>
        </div>
        <div class="order-row">
            <span class="order-label">Amount Paid</span>
            <span class="order-value">₹{{ order.total }}</span>
        </div>
        <div class="order-row">
            <span class="order-label">Payment Method</span>
            <span class="order-value">Online Payment</span>
        </div>
    </div>
    {% endif %}

    <div class="btn-group">
        <a href="{% url 'home' %}" class="btn btn-primary">Continue Shopping</a>
      
    </div>

</div>

</body>
</html>
