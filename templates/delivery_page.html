<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delivery - Order #{{ order.id }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body { background: #f4f6fb; font-family: 'Poppins', sans-serif; }

.header-with-topbar { background: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.35); }
.dashboard-header { padding: 18px 24px; }
.dashboard-header h4, .dashboard-header small, .dashboard-header i { color: #fff; }
.dashboard-header .nav-link { color: #fff !important; }
.dashboard-header .nav-link:hover { color: #bdbdbd !important; }

.page-container { padding: 40px; }

.delivery-card {
    background: white;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.big-icon {
    font-size: 60px;
    color: #22c55e;
}

.order-info {
    font-size: 18px;
    margin: 10px 0;
}
</style>
</head>

<body>

<!-- ✅ NAVBAR SAME AS YOUR DESIGN -->
<header class="header-with-topbar">
<nav class="navbar dashboard-header navbar-expand-lg">
<div class="container-fluid px-0">

<div class="d-flex align-items-center gap-3">
<i class="bi bi-speedometer2 fs-2"></i>
<div>
<h4 class="mb-0">Admin Dashboard</h4>
<small>Overview of store performance</small>
</div>
</div>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="adminNavbar">
<ul class="navbar-nav gap-3">
<li><a class="nav-link" href="{% url 'dashboard' %}">Home</a></li>
<li><a class="nav-link" href="{% url 'order_list' %}">Orders</a></li>
<li><a class="nav-link" href="{% url 'paid_orders' %}">Paid</a></li>
<li><a class="nav-link" href="{% url 'pending_orders' %}">Pending</a></li>
<li><a class="nav-link" href="{% url 'customer_list' %}">Customers</a></li>
<li><a class="nav-link text-danger" href="{% url 'user_logout' %}">Logout</a></li>
</ul>
</div>

</div>
</nav>
</header>

<!-- ✅ MAIN CONTENT -->
<div class="page-container">

<div class="delivery-card">

<i class="bi bi-truck big-icon"></i>

<h2 class="mt-3">Order in Shipping</h2>

<p class="order-info"><strong>Order ID:</strong> #{{ order.id }}</p>
<p class="order-info"><strong>Customer:</strong> {{ order.first_name }}</p>
<p class="order-info"><strong>Total:</strong> ₹ {{ order.total }}</p>

<hr>

<!-- ✅ DELIVER BUTTON -->
<form method="POST" action="{% url 'mark_as_delivered' order.id %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-success btn-lg w-100 mt-3">
        📦 Mark as Delivered
    </button>
</form>

<!-- BACK BUTTON -->
<a href="{% url 'order_detail' order.id %}" class="btn btn-dark w-100 mt-3">
    ← Back to Order
</a>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
