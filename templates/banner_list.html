{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banner List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        /* NAVBAR (added) */
        .navbar-premium{
            background:#000;
            padding:18px 30px;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        .navbar-brand{
            color:#fff !important;
            font-weight:600;
            font-size:22px;
        }

        .nav-link{
            color:#ddd !important;
            font-weight:500;
            margin-left:15px;
        }

        .nav-link:hover{
            color:#fff !important;
        }

        .header-box {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .banner-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            transition: 0.3s;
            background: #fff;
        }

        .banner-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .banner-img {
            height: 200px;
            object-fit: cover;
        }

        .badge-active {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #000;
            color: #fff;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .btn {
            border-radius: 10px;
        }

        .empty-box {
            background: #fff;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-premium">
<div class="container">

<a class="navbar-brand" href="#">
<i class="bi bi-speedometer2 me-2"></i> Banner
</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="{% url 'dashboard' %}">
<i class="bi bi-house me-1"></i> Dashboard
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'banner_list' %}">
<i class="bi bi-images me-1"></i> Banner List
</a>
</li>

</ul>

</div>
</div>
</nav>

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 header-box">
        <div>
            <h4 class="mb-0 fw-bold">Home Banners</h4>
            <small class="text-muted">Manage homepage banners</small>
        </div>

        <a href="{% url 'add_banner' %}" class="btn btn-dark">
            <i class="bi bi-plus-circle"></i> Add Banner
        </a>
    </div>

    <!-- Banner Grid -->
    <div class="row">

        {% for banner in banners %}
        <div class="col-lg-4 col-md-6 mb-4">

            <div class="card banner-card position-relative">

                <!-- Active Badge -->
                {% if banner.is_active %}
                <span class="badge-active">Active</span>
                {% endif %}

                <!-- Image -->
                <img src="{{ banner.image.url }}" class="card-img-top banner-img">

                <!-- Content -->
                <div class="card-body text-center">

                    <h6 class="fw-semibold mb-2">{{ banner.title }}</h6>

                    <div class="d-flex justify-content-center gap-2 mt-3">

                        <a href="{% url 'edit_banner' banner.id %}" 
                           class="btn btn-warning btn-sm">
                           <i class="bi bi-pencil"></i>
                        </a>

                        <a href="{% url 'delete_banner' banner.id %}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this banner?')">
                           <i class="bi bi-trash"></i>
                        </a>

                    </div>

                </div>

            </div>

        </div>

        {% empty %}
        <div class="col-12">
            <div class="empty-box">
                <i class="bi bi-image fs-1 text-muted"></i>
                <h5 class="mt-3">No Banners Yet</h5>
                <p class="text-muted">Start by adding your first banner</p>

                <a href="{% url 'add_banner' %}" class="btn btn-dark mt-2">
                    Add Banner
                </a>
            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
