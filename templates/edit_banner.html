{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Banner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        /* NAVBAR (added) */
        .navbar-premium{
            background:#000;
            padding:18px 30px;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        .navbar-brand{
            color:#fff !important;
            font-weight:600;
            font-size:22px;
        }

        .nav-link{
            color:#ddd !important;
            font-weight:500;
            margin-left:15px;
        }

        .nav-link:hover{
            color:#fff !important;
        }

        .banner-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .upload-box {
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            background: #fafafa;
            transition: 0.3s;
            cursor: pointer;
        }

        .upload-box:hover {
            border-color: #000;
            background: #fff;
        }

        .preview-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 10px;
        }

        .btn-dark {
            border-radius: 12px;
            padding: 12px;
            font-weight: 500;
        }

        .title-header {
            font-weight: 600;
        }

        .current-label {
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-premium">
<div class="container">

<a class="navbar-brand" href="#">
<i class="bi bi-speedometer2 me-2"></i> Banner
</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="{% url 'dashboard' %}">
<i class="bi bi-house me-1"></i> Dashboard
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'banner_list' %}">
<i class="bi bi-images me-1"></i> Banner List
</a>
</li>

</ul>

</div>
</div>
</nav>

<div class="container d-flex justify-content-center">

    <div class="col-lg-6">

        <form method="POST" enctype="multipart/form-data" class="card banner-card p-4" style="margin: 39px;">
            {% csrf_token %}

            <div class="text-center mb-4">
                <h3 class="title-header">Edit Banner</h3>
                <p class="text-muted small">Update your homepage banner</p>
            </div>

            <!-- Title -->
            <div class="mb-3">
                <label class="form-label">Banner Title</label>
                <input type="text" name="title" value="{{ banner.title }}"
                       class="form-control" required>
            </div>

            <!-- Desktop Image -->
            <div class="mb-3">
                <label class="form-label">Desktop Image</label>

                <div class="current-label">Current Image</div>
                <img src="{{ banner.image.url }}" class="preview-img mb-2">

                <label class="upload-box w-100">
                    <i class="bi bi-cloud-upload fs-2"></i>
                    <p class="mb-1">Replace desktop image</p>
                    <input type="file" name="image" hidden onchange="previewImage(event, 'preview1')">
                </label>

                <img id="preview1" class="preview-img d-none">
            </div>

            <!-- Mobile Image -->
            <div class="mb-3">
                <label class="form-label">Mobile Image</label>

                {% if banner.mobile_image %}
                    <div class="current-label">Current Image</div>
                    <img src="{{ banner.mobile_image.url }}" class="preview-img mb-2">
                {% endif %}

                <label class="upload-box w-100">
                    <i class="bi bi-phone fs-2"></i>
                    <p class="mb-1">Replace mobile image</p>
                    <input type="file" name="mobile_image" hidden onchange="previewImage(event, 'preview2')">
                </label>

                <img id="preview2" class="preview-img d-none">
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-dark w-100">
                    <i class="bi bi-check-circle"></i> Update
                </button>

                <a href="{% url 'banner_list' %}" class="btn btn-outline-secondary w-100">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

<!-- Preview Script -->
<script>
function previewImage(event, id) {
    const reader = new FileReader();
    reader.onload = function(){
        const output = document.getElementById(id);
        output.src = reader.result;
        output.classList.remove("d-none");
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
