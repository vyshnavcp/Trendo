<!doctype html>
<html class="no-js" lang="en">
<head>
    {% load static %}
    <title>Login</title>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/vendors.min.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/icon.min.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}"/>
    <link rel="stylesheet" href="{% static 'demos/clothing-store/clothing-store.css' %}" />

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body data-mobile-nav-style="classic">

{% include 'components/navbar.html' %}

<!-- Login Section -->
<section class="padding-290">
    <div class="container">
        <div class="row g-0 justify-content-center">
            <div class="col-xl-4 col-lg-5 col-md-10 contact-form-style-04">

                <span class="fs-26 xs-fs-24 alt-font fw-500 text-dark-gray mb-20px d-block">
                    Member login
                </span>

                <form method="post" action="{% url 'login_post' %}">
                    {% csrf_token %}

                    <label class="text-dark-gray mb-10px fw-500">
                        Username or Email<span class="text-red">*</span>
                    </label> 
                    <input class="mb-20px required"
                           type="text"
                           name="name"
                           placeholder="Enter your username or email"
                           required />

                    <label class="text-dark-gray mb-10px fw-500">
                        Password<span class="text-red">*</span>
                    </label> 
                    <input id="password"
                           class="mb-10px required"
                           type="password"
                           name="password"
                           placeholder="Enter your password"
                           required />

                    <small id="password_error" class="text-danger"></small>

                    <div class="position-relative text-end mb-20px">
                        <a href="{% url 'password_reset' %}" 
                           class="fs-14 text-dark-gray fw-500 text-decoration-line-bottom">
                           Forget your password?
                        </a>
                    </div>

                    <button class="mb-20px btn btn-medium btn-round-edge btn-dark-gray btn-box-shadow w-100"
                            type="submit">
                        Login
                    </button>

                    <div class="text-center">
                        Don't have an account? 
                        <a href="{% url 'register' %}" 
                           class="fw-500 text-decoration-line-bottom">
                            Register Now
                        </a>
                    </div>

                </form>

            </div>
        </div>
    </div>
</section>

{% include 'components/footer.html' %}

<!-- JS -->
<script src="{% static 'js/jquery.js' %}"></script>
<script src="{% static 'js/vendors.min.js' %}"></script>
<script src="{% static 'js/main.js' %}"></script>

<!-- ✅ SweetAlert Messages -->
{% if messages %}
<script>
document.addEventListener("DOMContentLoaded", function () {

    {% for message in messages %}

    Swal.fire({
        icon: "{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}info{% endif %}",
        title: "{% if message.tags == 'error' %}Login Failed{% else %}Notice{% endif %}",
        text: "{{ message }}",
        confirmButtonText: "OK",
        timer: 3000
    });

    {% endfor %}

});
</script>
{% endif %}
<script>
const passwordInput = document.getElementById("password");
const passwordError = document.getElementById("password_error");

passwordInput.addEventListener("input", function() {
    if (!passwordInput.value.trim()) {
        passwordError.innerText = "Password is required";
    } else {
        passwordError.innerText = "";
    }
});
</script>

</body>
</html>
